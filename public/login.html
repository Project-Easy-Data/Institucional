<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/login.css">
    <title>EasyData - Login</title>
    <link rel="icon" href="logos/favicon_easydata.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <header>
        <section class="logoLogin">
            <a href="index.html"> <img src="logos/Logo_EasyData_V02.png" alt=""></a>
        </section>
        <button class="menu-hamburguer" id="menuBtn" aria-label="Abrir menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav class="menu" id="menuNav">
            <a class="ativo" href="index.html"><b>Início</b></a>
            <a class="ativo" href="index.html"><b>Quem Somos</b></a>
            <a class="ativo" href="contato.html"><b>Contato</b></a>
        </nav>
    </header>

    <main>
        <section class="section-login">
            <div class="form-login">

                <div class = "titulo-bemvindo">
                <h2>Boas-vindas de volta!</h2>
</div>
                <div class="inputs">
                    <label class="tituloCampo">
                        Email
                        <div class="campoInput">
                            <input type="email" id="email" placeholder="Digite o Email">
                        </div>
                        <div id="msgCorretoEmail"></div>
                    </label>

                    <label class="tituloCampo">
                        Senha
                        <div class="campoInput">
                            <input type="password" id="senha" placeholder="Digite a senha">
                            <i id="olhoAberto" class="fa-regular fa-eye"></i>
                            <i id="olhoFechado" class="fa-regular fa-eye-slash"></i>
                        </div>
                        <div id="msgCorretoSenha"></div>
                    </label>
                </div>
                <button class="botaoLogin" onclick="entrar()">Login</button>

                <p class="RedefinirTexto">
                    Esqueceu sua senha?
                    <a class="textoRedifinir" href="emailConfirm.html">Redefinir</a>
                </p>
            </div>
            </div>
        </section>
        <section class="bannerLogo">
            <img src="logos/Logo_EasyData_V01.png">
        </section>
    </main>
    <script src="js/menu.js"></script>
    <script src="js/login.js"></script>
</body>

</html>
