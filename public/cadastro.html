<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/reset.css">
    <link rel="stylesheet" href="/css/responsive.css">
    <link rel="stylesheet" href="/css/cadastro.css">
    <title>EasyData</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <header>
        <section class="logoLogin">
            <a href="index.html"> <img src="logos/Logo_EasyData_V02.png" alt=""></a>
        </section>
        <nav class="menu">
            <a href="index.html"><b>Home</b></a>
            <a href="quemSomos.html"><b>Quem Somos</b></a>
            <a href="#"><b>Métricas</b></a>
        </nav>
    </header>
    <main>
        <section class="section-cadastro">
            <div class="form-cadastro">
                <label class="tituloCampo">Empresa:</label>
                <div class="campoInput">
                    <input type="text" id="empresa" placeholder="Digite o nome da empresa">
                </div>
                <div id="msgCorretoNome"></div>
                <label class="tituloCampo">Email:</label>
                <div class="campoInput">
                    <input type="email" id="email" placeholder="Digite o email">
                </div>
                <div id="msgCorretoEmail"></div>

                <label class="tituloCampo">CNPJ:</label>
                <div class="campoInput">
                    <input type="number" maxlength="14" id="cnpj" placeholder="Digite o CNPJ">
                </div>
                <div id="msgCorretoCnpj"></div>
                <label class="tituloCampo">Senha:</label>
                <div class="campoInput">
                    <input type="email" id="senha" placeholder="" disabled>
                    <button id="gerarSenha" onclick="gerarSenha()">Gerar Senha</button>
                </div>
                <div id="msgCorretoSenha"></div>
                <button class="botaoCadastro" onclick="cadastrar()">Cadastrar</button>
            </div>
        </section>
        <section class="bannerLogo">
            <img src="logos/Logo_EasyData_V01.png">
        </section>
    </main>

    <script src="/js/cadastro.js"></script>
</body>
</html>
