<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/reset.css">
    <title>Dashboard</title>
    <link rel="icon" href="logos/favicon_easydata.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <aside>
        <div class="logo">
            <img src="img/logodata.png" alt="Logo da EasyData">
        </div>

        <div class="btns">
            <ul>
                <li>
                    <p><a href=""><i class="fa-solid fa-house"></i> Inicio</a></p>
                </li>
                <li>
                    <p><a href=""><i class="fa-solid fa-chart-line"></i> Gráfico</a></p>
                </li>
                <li>
                    <p><a href=""><i class="fa-solid fa-user-group"></i> Perfil</a></p>
                </li>
                <li>
                    <p><a href=""><i class="fa-solid fa-gear"></i> Configuração</a></p>
                </li>
            </ul>
        </div>

        <div class="nomeCargo">
            <div class="perfil">
                <img src="https://placehold.co/50x50" alt="" srcset="">
            </div>
            <div class="username">
                <p class="nome">Nome</p>
                <p class="cargo">Cargo</p>
            </div>
        </div>

        <div class="sair">
            <button class="btnSair">Sair</button>
        </div>
    </aside>

    <main>
        <section id="tituloFiltros">
            <div class="titulo">
                <h2>Saneamento da Cidade</h2>
            </div>

            <div class="filtros">
                <div class="filtro ano">
                    <p>Ano</p>
                    <select name="2024" id="">
                        <option value="2024">2024</option>
                        <option value="2020">2020</option>
                        <option value="2018">2018</option>
                    </select>
                </div>
                
                <div class="filtro estado">
                    <p>Estado</p>
                    <select value="Paraná" name="Paraná" id="">
                        
                    </select>
                </div>
                
                <div class="filtro cidade">
                    <p>Cidade</p>
                    <select value="Curitiba" name="Curitiba" id="">Cidade</select>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
