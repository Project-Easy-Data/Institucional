        crossorigin="anonymous" referrerpolicy="no-referrer" />

<body>
    <header>
        <section class="logoLogin">
            <a href="index.html"> <img src="logos/Logo_EasyData_V02.png" alt=""></a>
        </section>
        <button class="menu-hamburguer" id="menuBtn" aria-label="Abrir menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav class="menu" id="menuNav">
            <button id="fecharMenu">✕</button>

        </nav>
    </header>

    <main>
        <section class="section-redefinir">
            <div class="form-redefinir">
                <label class="tituloCampo">Senha Atual
                    <div class="campoInput">
                        <input type="email" id="senhaAtual" placeholder="Digite a senha">
                    </div>
                </label>

                <label class="tituloCampo">Nova senha
                    <div class="campoInput">
                        <input type="email" id="redefinirSenha" placeholder="Digite a senha">
                    </div>
                </label>

                <label class="tituloCampo">Repetir senha
                    <div class="campoInput">
                        <input type="password" id="senha" placeholder="Digite a senha">
                    </div>
                </label>

                <button class="botaoRedefinir">Trocar senha </button>

                <p class="RedefinirTexto">
                    Ir para tela de login
                    <a class="textoRedifinir" href="login.html">Login</a>
                </p>
            </div>
        </section>
        <section class="bannerLogo">
            <img src="logos/Logo_EasyData_V01.png">
        </section>
