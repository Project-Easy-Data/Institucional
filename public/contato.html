<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/reset.css">
    <link rel="stylesheet" href="/css/contato.css">
    <title>EasyData - Contato</title>
    <link rel="icon" href="logos/favicon_easydata.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

    <header>
        <section class="logoLogin">
            <a href="index.html">
                <img src="logos/Logo_EasyData_V02.png">
            </a>
        </section>

        <nav class="menu">
            <a href="index.html"><b>Home</b></a>
            <a href="quemSomos.html"><b>Quem Somos</b></a>
            <a href="contato.html"><b>Contato</b></a>
        </nav>
    </header>

    <main>
        <section class="section-contato">
            <div class="form-contato">

                <p class="subtituloContato">Entre em contato com a nossa equipe</p>

                <label class="tituloCampo">Nome
                    <div class="campoInput">
                        <input type="text" id="nome" placeholder="Digite seu nome">
                    </div>
                    <div id="msgCorretoNome"></div>
                </label>

                <label class="tituloCampo">Email
                    <div class="campoInput">
                        <input type="email" id="email" placeholder="Digite seu email">
                    </div>
                    <div id="msgCorretoEmail"></div>
                </label>

                <label class="tituloCampo">Mensagem
                    <div class="campoMensagem">
                        <textarea id="mensagem" placeholder="Digite sua mensagem"></textarea>
                    </div>
                    <div id="msgCorretoMensagem"></div>
                </label>

                <button class="botaoContato" onclick="enviar()">Enviar</button>

                <div id="enviadoSucesso"></div>

            </div>
        </section>
    </main>
    <script src="js/contato.js"></script>

</body>

</html>
