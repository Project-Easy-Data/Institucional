<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/barraLateral.css" />
    <link rel="stylesheet" href="css/usuarios.css" />

    <title>Usuários</title>
    <link rel="icon" href="logos/favicon_easydata.ico" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet"
    />

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        crossorigin="anonymous"
        referrerpolicy="no-referrer"
    />
</head>

<body>
    <aside>
        <div class="logo">
            <img src="img/logodata.png" alt="Logo da EasyData" />
        </div>

        <div class="nomeCargo">
            <div class="perfil">
                <i
                    class="fa-regular fa-user"
                    style="font-size: 2vw; border: 1px solid #010101; border-radius: 50%; padding: 1vw;"
                ></i>
            </div>

            <div class="username">
                <p id="nomeUsuario" class="nome">Usuário</p>
                <p id="cargoUsuario" class="cargo">Cargo</p>
            </div>
        </div>

        <div class="btns">
            <ul>
                <li>
                    <p>
                        <a href="dashboardGerente.html">
                            <i class="fa-solid fa-house"></i> Indicadores
                        </a>
                    </p>
                </li>

                <li>
                    <p>
                        <a href="usuarios.html">
                            <i class="fa-solid fa-user-group"></i> Usuários
                        </a>
                    </p>
                </li>

                <li>
                    <p>
                        <a href="configuracao.html">
                            <i class="fa-solid fa-gear"></i> Configuração
                        </a>
                    </p>
                </li>
            </ul>
        </div>

        <div class="sair">
            <button class="btnSair" onclick="sair()">Sair</button>
        </div>
    </aside>

    <div class="container">
        <h2>Usuários</h2>

        <div class="card">
            <div class="container2">
                <div class="addUsuario">
                    <button onclick="addFunc()">
                        <p>+ Adicionar Usuário</p>
                    </button>
                </div>

                <div class="listaUsuarios">
                    <div class="cabecalho">
                        <p>Nome</p>
                        <p>Email</p>
                        <p>Cargo</p>
                        <p></p>
                    </div>
                </div>
            </div>
        </div>

        <div class="sobrepor" id="sobrepor">
            <div class="cardCadastro">
                <div class="cardTitulo">
                    <p>Adicionar Usuário</p>
                </div>

                <div class="campoCadastro">
                    <label for="inputNome">Nome</label>
                    <input type="text" id="inputNome" placeholder="Ex: Rafael Calderon" />
                    <p class="erro" id="erroNome" style="display: none">Informe o nome.</p>
                </div>

                <div class="campoCadastro">
                    <label for="inputEmail">Email</label>
                    <input type="text" id="inputEmail" placeholder="Ex: rcalderon@easydata.com" />
                    <p class="erro" id="erroEmail" style="display: none">Informe o email.</p>
                </div>

                <div class="campoCadastro">
                    <label for="selectCargo">Cargo</label>
                    <select id="selectCargo">
                        <option value="">Selecionar...</option>
                        <option value="1">Gerente</option>
                        <option value="2">Funcionário</option>
                        <option value="3">Suporte</option>
                    </select>
                    <p class="erro" id="erroCargo" style="display: none">Selecione um cargo.</p>
                </div>

                <div id="acoes">
                    <button class="btnCancelar" onclick="fecharModal()">Cancelar</button>
                    <button class="btnConfirmar" onclick="confirmar()">Adicionar</button>
                </div>
            </div>
        </div>

        <div class="sobrepor" id="sobreporSenha">
            <div class="cardCadastro">
                <div class="cardTitulo">
                    <p>Senha temporária</p>
                </div>

                <div class="campoCadastro">
                    <label for="exibirSenha">Envie esta senha para o usuário:</label>
                    <input type="text" id="exibirSenha" readonly />
                </div>

                <div id="acoes">
                    <button class="btnCancelar" onclick="fecharSenha()">Fechar</button>
                    <button class="btnConfirmar" onclick="copiarSenha()">Copiar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/usuarios.js"></script>
</body>
</html>
