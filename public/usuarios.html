<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="css/usuarios.css" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/barraLateral.css">
    <title>Usuários</title>
    <link rel="icon" href="logos/favicon_easydata.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
<body>
    <aside>
      <div class="logo">
        <img src="img/logodata.png" alt="Logo da EasyData" />
      </div>

      <div class="nomeCargo">
        <div class="perfil">
          <i class="fa-regular fa-user" style="font-size: 2vw; border: 1px solid #010101; border-radius: 50%; padding: 1vw;"></i>
        </div>
        <div class="username">
          <p class="nome">Bobby</p>
          <p class="cargo">Gerente</p>
        </div>
      </div>

      <div class="btns">
        <ul>
          <li>
            <p>
              <a href=""><i class="fa-solid fa-house"></i> Inicio</a>
            </p>
          </li>
          <li>
            <p>
              <a href="usuarios.html"><i class="fa-solid fa-user-group"></i> Usuários</a>
            </p>
          </li>
          <li>
            <p>
              <a href="configuracao.html"><i class="fa-solid fa-gear"></i> Configuração</a>
            </p>
          </li>
        </ul>
      </div>

      <div class="sair">
        <button class="btnSair">Sair</button>
      </div>
    </aside>
    <div class="container">
        <h2>Usuários</h2>
        <div class="card">
            <div class="container2">
                <div class="addUsuario">
                    <button onclick="addFunc()">
                        <p>+ Adicionar Usuário</p>
                    </button>
                </div>
                <div class="listaUsuarios">
                    <div class="cabecalho">
                        <p>Nome</p>
                        <p>Email</p>
                        <p>Cargo</p>
                        <p></p>
                    </div>
                    <div class="linha">
                        <p>João Silva</p>
                        <p>joao@easydata.com</p>
                        <p>Gerente</p>
                        <button id="excluir">Excluir</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
