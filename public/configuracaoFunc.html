<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/configuracao.css">
    <link rel="stylesheet" href="css/barraLateral.css">
    <title>EasyData - Cadastro</title>
    <link rel="icon" href="logos/favicon_easydata.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <aside>
      <div class="logo">
        <img src="img/logodata.png" alt="Logo da EasyData" />
      </div>

      <div class="nomeCargo">
        <div class="perfil">
          <i class="fa-regular fa-user" style="font-size: 2vw; border: 1px solid #010101; border-radius: 50%; padding: 1vw;"></i>
        </div>
        <div class="username">
          <p class="nome">Bobby</p>
          <p class="cargo">Gerente</p>
        </div>
      </div>

      <div class="btns">
        <ul>
          <li>
            <p>
              <a href="dashboardFunc.html"><i class="fa-solid fa-house"></i> Inicio</a>
            </p>
          </li>
          <li>
            <p>
              <a href="configuracaoFunc.html"><i class="fa-solid fa-gear"></i> Configuração</a>
            </p>
          </li>
        </ul>
      </div>

      <div class="sair">
        <button class="btnSair">Sair</button>
      </div>
    </aside>
    <div class="container">
        <div class="titulo">
            <h2>Configuração</h2>
        </div>

        <div class="card">
            <div class="campos">
                <div class="campo">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome">
                </div>
                <div class="campo">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Digite seu email">
                </div>
                <div class="campo">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="Digite sua senha">
                </div>
                <div class="campo">
                    <label for="confirmarSenha">Confirmar Senha</label>
                    <input type="password" id="confirmarSenha" name="confirmarSenha" placeholder="Confirme sua senha">
                </div>

                <button class="botaoSalvar">Salvar Alterações</button>
            </div>
      </div>
    </div>
</body>
</html>
